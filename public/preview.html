<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Saida dos Dados</title>
    <style>
        :root {
            --bg: #10151c;
            --panel: #161d26;
            --panel-soft: #1d2631;
            --accent: #26c281;
            --border: rgba(255, 255, 255, 0.08);
            --muted: #a8b0ba;
            --text: #eef3f8;
        }

        * {
            box-sizing: border-box;
            font-family: Inter, Segoe UI, Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 28px;
        }

        .top {
            background: #151c25;
            border-bottom: 1px solid var(--border);
            padding: 22px 0;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 20px;
            text-align: center;
        }

        .search {
            display: flex;
            gap: 10px;
            max-width: 760px;
            margin: 0 auto;
        }

        input {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }

        button {
            border: 0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .search button {
            padding: 10px 18px;
            background: var(--accent);
            color: #062217;
        }

        .hidden {
            display: none;
        }

        .notice {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 760px;
            margin: 14px auto 0;
            padding: 10px 12px;
            color: #fff6a8;
            background: rgba(255, 230, 0, 0.12);
            border: 1px solid rgba(255, 230, 0, 0.35);
            border-radius: 8px;
            box-shadow: 0 0 18px rgba(255, 230, 0, 0.14);
            white-space: nowrap;
            overflow: hidden;
        }

        .notice svg {
            width: 20px;
            height: 20px;
            flex: 0 0 20px;
            fill: #ffe600;
        }

        .notice span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notice button {
            width: 24px;
            height: 24px;
            flex: 0 0 24px;
            margin-left: auto;
            color: #fff6a8;
            background: transparent;
            border: 1px solid rgba(255, 230, 0, 0.35);
            line-height: 1;
        }

        #status {
            margin: 8px 0;
            color: var(--muted);
            text-align: center;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .company-option {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            padding: 16px;
            text-align: left;
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .company-option:hover {
            border-color: rgba(38, 194, 129, 0.55);
            background: var(--panel-soft);
        }

        .company-option-name {
            font-size: 16px;
            font-weight: 800;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
        }

        .result-card {
            margin-top: 20px;
            padding: 18px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .company-profile {
            display: flex;
            align-items: center;
            gap: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .company-photo {
            width: 112px;
            height: 112px;
            flex: 0 0 112px;
            object-fit: cover;
            border-radius: 8px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
        }

        .company-info {
            min-width: 0;
        }

        .company-name {
            margin: 0 0 8px;
            font-size: 24px;
            line-height: 1.15;
            overflow-wrap: anywhere;
        }

        .company-link {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        .company-link:hover {
            text-decoration: underline;
        }

        .detail-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 18px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 44px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
        }

        .detail-item svg {
            width: 22px;
            height: 22px;
            flex: 0 0 22px;
            fill: var(--accent);
        }

        .detail-item span {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        @media (max-width: 640px) {
            .container {
                padding: 18px;
            }

            .search {
                flex-direction: column;
            }

            .company-profile {
                align-items: flex-start;
            }

            .company-photo {
                width: 84px;
                height: 84px;
                flex-basis: 84px;
            }
        }
    </style>
</head>
<body>
    <header class="top">
        <div class="container">
            <h1>Saida dos Dados - Google Maps</h1>
            <form id="form" class="search">
                <input id="termo" placeholder="Digite o termo (ex: King Star Colchoes)" required />
                <button type="submit">Buscar</button>
            </form>
        </div>
    </header>

    <main class="container">
        <div id="status"></div>
        <div id="avisoTelefone" class="notice hidden">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 1 21h22L12 2Zm1 15h-2v-2h2v2Zm0-4h-2V8h2v5Z"/></svg>
            <span>Esta empresa nao possui numero.</span>
            <button id="fecharAvisoTelefone" type="button" aria-label="Fechar aviso">X</button>
        </div>
        <div id="galeria" class="grid"></div>

        <section id="resultado" class="result-card hidden">
            <div class="company-profile">
                <img id="empresaFoto" class="company-photo" src="" alt="Foto da empresa" />
                <div class="company-info">
                    <h2 id="empresaNomeTop" class="company-name"></h2>
                    <a id="empresaLink" class="company-link" href="#" target="_blank" rel="noopener">Abrir no Maps</a>
                </div>
            </div>

            <div class="detail-list">
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s7-5.4 7-12a7 7 0 0 0-14 0c0 6.6 7 12 7 12Zm0-9a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z"/></svg>
                    <span id="enderecoVal"></span>
                </div>
                <div id="telefoneItem" class="detail-item">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.7 21 3 13.3 3 3.7c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1l-2.2 2.2Z"/></svg>
                    <span id="telefoneVal"></span>
                </div>
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm1 11h4v-2h-3V6h-2v7h1Z"/></svg>
                    <span id="statusEmpresaVal"></span>
                </div>
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21 7 14.2l-5-4.9 6.9-1L12 2Z"/></svg>
                    <span id="notaVal"></span>
                </div>
                <div class="detail-item">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v12H7.8L4 20V4Zm4 4v2h8V8H8Zm0 4v2h5v-2H8Z"/></svg>
                    <span id="avaliacoesVal"></span>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById('form');
        const termoInput = document.getElementById('termo');
        const status = document.getElementById('status');
        const avisoTelefone = document.getElementById('avisoTelefone');
        const fecharAvisoTelefone = document.getElementById('fecharAvisoTelefone');
        const resultado = document.getElementById('resultado');
        const galeria = document.getElementById('galeria');
        const empresaFoto = document.getElementById('empresaFoto');
        const empresaNomeTop = document.getElementById('empresaNomeTop');
        const empresaLink = document.getElementById('empresaLink');
        const enderecoVal = document.getElementById('enderecoVal');
        const telefoneItem = document.getElementById('telefoneItem');
        const telefoneVal = document.getElementById('telefoneVal');
        const statusEmpresaVal = document.getElementById('statusEmpresaVal');
        const notaVal = document.getElementById('notaVal');
        const avaliacoesVal = document.getElementById('avaliacoesVal');

        fecharAvisoTelefone.addEventListener('click', () => {
            avisoTelefone.classList.add('hidden');
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const termo = termoInput.value.trim();
            if (!termo) return;

            status.textContent = 'Buscando empresas...';
            avisoTelefone.classList.add('hidden');
            resultado.classList.add('hidden');
            galeria.innerHTML = '';

            try {
                const response = await fetch('/api/listar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ termo })
                });

                if (!response.ok) throw new Error('Erro ao listar empresas');

                const empresas = await response.json();
                if (empresas.erro) throw new Error(empresas.erro);
                if (!Array.isArray(empresas) || empresas.length === 0) {
                    status.textContent = 'Nenhuma empresa encontrada';
                    return;
                }

                status.textContent = '';
                renderEmpresas(empresas, termo);
            } catch (error) {
                status.textContent = 'Erro: ' + error.message;
            }
        });

        function renderEmpresas(empresas, termo) {
            galeria.innerHTML = '';

            const titulo = document.createElement('h3');
            titulo.textContent = `Empresas encontradas (${empresas.length})`;
            galeria.appendChild(titulo);

            empresas.forEach((empresa, index) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'company-option';

                const nome = document.createElement('span');
                nome.className = 'company-option-name';
                nome.textContent = empresa.nome || `Empresa ${index + 1}`;

                const endereco = document.createElement('span');
                endereco.className = 'muted';
                endereco.textContent = empresa.endereco || '';

                item.appendChild(nome);
                item.appendChild(endereco);
                item.addEventListener('click', () => selecionarEmpresa(termo, index));

                galeria.appendChild(item);
            });
        }

        async function selecionarEmpresa(termo, indice) {
            status.textContent = 'Extraindo dados da empresa...';
            avisoTelefone.classList.add('hidden');
            galeria.innerHTML = '';

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ termo, indice })
                });

                if (!response.ok) throw new Error('Erro na requisicao');

                const dados = await response.json();
                if (dados.erro) throw new Error(dados.erro);

                status.textContent = '';
                renderResultado(dados);
            } catch (error) {
                status.textContent = 'Erro: ' + error.message;
            }
        }

        function renderResultado(dados) {
            resultado.classList.remove('hidden');

            empresaNomeTop.textContent = dados.estabelecimento || '-';
            empresaFoto.src = dados.foto_original || '';
            empresaFoto.alt = dados.estabelecimento || 'Foto da empresa';
            empresaLink.href = dados.link_maps || '#';
            empresaLink.textContent = dados.link_maps ? 'Abrir no Maps' : 'Link indisponivel';

            enderecoVal.textContent = dados.endereco || '-';
            statusEmpresaVal.textContent = dados.status_empresa || '-';
            notaVal.textContent = dados.nota || '-';

            if (dados.telefone) {
                telefoneItem.classList.remove('hidden');
                telefoneVal.textContent = dados.telefone;
                avisoTelefone.classList.add('hidden');
            } else {
                telefoneItem.classList.add('hidden');
                telefoneVal.textContent = '';
                avisoTelefone.classList.remove('hidden');
            }

            if (typeof dados.totalAvaliacoes === 'number') {
                const total = new Intl.NumberFormat('pt-BR').format(dados.totalAvaliacoes);
                avaliacoesVal.textContent = total;
            } else {
                avaliacoesVal.textContent = '-';
            }
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Visualizador de Scrape</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="top">
        <div class="container">
            <h1>Visualizador de Dados - Google Maps</h1>
            <form id="form" class="search">
                <input id="termo" placeholder="Digite o termo (ex: King Star Colchões)" required />
                <button type="submit">Buscar</button>
            </form>
        </div>
    </header>

    <main class="container">
        <div id="status"></div>

        <section id="resultado" class="card hidden">
            <div class="company-banner">
                <img id="empresaFoto" class="company-photo" src="" alt="Foto da empresa" />
                <div class="company-info">
                    <p class="company-label">Empresa:</p>
                    <p id="empresaNomeTop" class="company-name"></p>
                    <a id="empresaLink" class="company-link" href="#" target="_blank" rel="noopener">Abrir no Maps</a>
                </div>
            </div>
            <div class="header-row">
                <h2 id="estabelecimento"></h2>
                <div class="score">
                    <span id="nota" class="badge"></span>
                    <span id="totalAvaliacoes" class="muted total"></span>
                </div>
            </div>

            <div class="summary card-item">
                    <div class="summary-left">
                        <p class="kv"><strong>Empresa:</strong> <span id="empresaNome"></span></p>
                        <p class="kv"><strong>Endereço:</strong> <span id="enderecoVal"></span></p>
                        <p class="kv"><strong>Telefone:</strong> <span id="telefoneVal"></span></p>
                    </div>
                    <div class="summary-right">
                        <p class="kv"><strong class="muted">Nota</strong></p>
                        <div class="big">
                            <span id="notaVal" class="badge"></span>
                            <div class="neon" id="avaliacoesVal"></div>
                        </div>
                    </div>
                </div>

                <h3>Resumo das Avaliações</h3>
                <div id="galeria" class="grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</body>
</html>
